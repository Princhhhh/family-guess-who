version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/game.db
      - UPLOADS_DIR=/app/uploads
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
