<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>נחש מי</title>
    <meta property="og:title" content="נחש מי — משחק משפחתי" />
    <meta property="og:description" content="משחק נחש מי אינטראקטיבי למשפחה!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Heebo for Hebrew readability, keep Rubik as fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Heebo', 'Rubik', 'Segoe UI', sans-serif;
        direction: rtl;
        background: #fffdf5;
        min-height: 100vh;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        color: #111111;
      }

      /* ── Neubrutalism button ── */
      .nb-btn {
        border: 2.5px solid #111;
        box-shadow: 4px 4px 0 #111;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
        cursor: pointer;
        font-family: 'Heebo', sans-serif;
        font-weight: 800;
      }
      .nb-btn:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 #111; }
      .nb-btn:active { transform: translate(4px,4px); box-shadow: 0px 0px 0 #111; }
      .nb-btn:disabled { opacity: 0.45; pointer-events: none; }

      input, textarea, select {
        font-size: 16px !important;
        font-family: 'Heebo', 'Rubik', sans-serif;
      }

      /* ── Keyframes ── */
      @keyframes floatY {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 4px 20px rgba(242,13,13,0.35); }
        50%       { box-shadow: 0 8px 36px rgba(242,13,13,0.65); }
      }
      @keyframes pulse-blue {
        0%, 100% { box-shadow: 0 4px 20px rgba(0,86,179,0.35); }
        50%       { box-shadow: 0 8px 36px rgba(0,86,179,0.65); }
      }
      @keyframes pulse-red {
        0%, 100% { box-shadow: 0 4px 16px rgba(242,13,13,0.4); }
        50%       { box-shadow: 0 6px 28px rgba(242,13,13,0.7); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      /* 3-D card flip on elimination */
      @keyframes cardFlip {
        0%   { transform: rotateY(0deg)  scale(1); }
        45%  { transform: rotateY(90deg) scale(0.9); }
        55%  { transform: rotateY(90deg) scale(0.9); }
        100% { transform: rotateY(0deg)  scale(1); }
      }
      /* staggered entry for board cards */
      @keyframes cardEnter {
        from { opacity: 0; transform: translateY(10px) scale(0.94); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }

      /* ── Utility classes ── */
      .float     { animation: floatY 3s ease-in-out infinite; }
      .fade-in   { animation: fadeInUp 0.5s ease forwards; }
      .btn-glow  { animation: pulse-glow 2.2s ease-in-out infinite; }
      .btn-red-glow { animation: pulse-red 1.8s ease-in-out infinite; }

      /* Gold shimmer for title */
      .gold-text {
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 40%, #fde68a 60%, #f59e0b 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      /* Character card — hover lift */
      .char-card {
        transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.3s ease;
        perspective: 600px;
      }
      .char-card:hover:not(.char-card--disabled) {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 10px 28px rgba(0,0,0,0.18) !important;
      }
      .char-card--flipping {
        animation: cardFlip 0.32s ease;
      }

      /* 3-D button press */
      .btn-3d {
        box-shadow: 0 5px 0 rgba(0,0,0,0.22), 0 2px 12px rgba(242,13,13,0.25);
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .btn-3d:active {
        transform: translateY(3px) scale(0.97) !important;
        box-shadow: 0 2px 0 rgba(0,0,0,0.22), 0 1px 6px rgba(242,13,13,0.2) !important;
      }
      .btn-3d-blue {
        box-shadow: 0 5px 0 rgba(0,0,0,0.22), 0 2px 12px rgba(0,86,179,0.25);
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .btn-3d-blue:active {
        transform: translateY(3px) scale(0.97) !important;
        box-shadow: 0 2px 0 rgba(0,0,0,0.22) !important;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #F20D0D; border-radius: 2px; opacity: 0.4; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
